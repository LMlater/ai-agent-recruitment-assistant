name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  agent-service:
    name: Agent service tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent-service
    env:
      LLM_PROVIDER: mock
      LLM_ENABLE_REAL_API: "false"
      REAL_API_ENABLED: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: agent-service/requirements.txt
      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt
      - name: Run tests
        run: python -m pytest tests -q

  backend-service:
    name: Backend service tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Run tests
        run: mvn test

  readiness:
    name: Demo readiness
    runs-on: ubuntu-latest
    needs: [agent-service, backend-service]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check demo package
        run: python scripts/check_demo_readiness.py --skip-services
